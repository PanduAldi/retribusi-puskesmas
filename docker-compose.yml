version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retribusi_puskesmas_app
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html

# No MySQL service defined because you are using an existing MySQL instance.
